name: build-opencv-python-android

on:
  workflow_dispatch:
    inputs:
      opencv_python_ref:
        required: false
        default: "latest"
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: install-tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cibuildwheel==3.4.0"

      - name: resolve-opencv-python-ref
        id: resolve_ref
        env:
          INPUT_REF: ${{ github.event.inputs.opencv_python_ref }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          input_ref = (os.environ.get("INPUT_REF") or "").strip()
          if input_ref and input_ref.lower() != "latest":
              ref = input_ref
          else:
              with urllib.request.urlopen("https://api.github.com/repos/opencv/opencv-python/releases/latest", timeout=30) as response:
                  data = json.load(response)
              ref = data["tag_name"]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"ref={ref}\n")
          print(ref)
          PY

      - name: checkout-opencv-python
        uses: actions/checkout@v5
        with:
          repository: opencv/opencv-python
          ref: ${{ steps.resolve_ref.outputs.ref }}
          path: external/opencv-python
          submodules: recursive

      - name: patch-setup-py
        working-directory: external/opencv-python
        run: |
          # 修复 _classify_installed_files_override 函数中的目录创建问题
          # 在写入 config-3.py 之前确保 python/cv2 目录存在
          python3 << 'EOF'
          import re

          with open('setup.py', 'r') as f:
              content = f.read()

          # 找到写入 config-3.py 的代码块，在前面添加目录创建
          old_code = '''        # add lines from the old __init__.py file to the config file
        with open(os.path.join(os.path.dirname(os.path.abspath(__file__)), 'scripts', '__init__.py'), 'r') as custom_init:
            custom_init_data = custom_init.read()
            with open('%spython/cv2/config-%s.py'
                % (cmake_install_dir, sys.version_info[0]), 'w') as opencv_init_config:
                opencv_init_config.write(custom_init_data)'''

          new_code = '''        # add lines from the old __init__.py file to the config file
        with open(os.path.join(os.path.dirname(os.path.abspath(__file__)), 'scripts', '__init__.py'), 'r') as custom_init:
            custom_init_data = custom_init.read()
            # 确保目标目录存在
            config_dir = os.path.join(cmake_install_dir, 'python', 'cv2')
            os.makedirs(config_dir, exist_ok=True)
            with open('%spython/cv2/config-%s.py'
                % (cmake_install_dir, sys.version_info[0]), 'w') as opencv_init_config:
                opencv_init_config.write(custom_init_data)'''

          if old_code in content:
              content = content.replace(old_code, new_code)
              with open('setup.py', 'w') as f:
                  f.write(content)
              print("Successfully patched setup.py")
          else:
              print("Warning: Could not find exact code block to patch, trying alternative approach...")
              # 备选方案：在函数开始处添加目录创建
              alt_old = '''    def _classify_installed_files_override('''
              alt_new = '''    def _classify_installed_files_override('''
              # 这种情况下不修改，让构建失败以便调试
              raise Exception("Could not patch setup.py - manual intervention needed")
          EOF

      - name: build-wheel
        working-directory: external/opencv-python
        env:
          CIBW_PLATFORM: android
          CIBW_ARCHS_ANDROID: arm64_v8a x86_64
          CIBW_BUILD: cp314-android_arm64_v8a cp314-android_x86_64
          CIBW_TEST_SKIP: "*"
          CIBW_BUILD_FRONTEND: build
          CIBW_BEFORE_BUILD: "python -m pip install -U pip setuptools wheel numpy"
          CIBW_BUILD_VERBOSITY: "3"
          # 关键：使用正确的 CMake 参数确保 Python 绑定正确安装
          CMAKE_ARGS: >-
            -DBUILD_ANDROID_PROJECTS=OFF 
            -DBUILD_ANDROID_EXAMPLES=OFF 
            -DBUILD_EXAMPLES=OFF 
            -DBUILD_TESTS=OFF 
            -DBUILD_PERF_TESTS=OFF 
            -DENABLE_PYLINT=OFF 
            -DBUILD_opencv_python3=ON 
            -DBUILD_SHARED_LIBS=OFF 
            -DCMAKE_BUILD_TYPE=Release
            -DINSTALL_CREATE_DISTRIB=ON
            -DPYTHON3_LIMITED_API=ON
            -DBUILD_OPENEXR=ON
        run: python -m cibuildwheel --output-dir wheelhouse . --platform android

      - name: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencv-python-android-cp314-arm64-x86_64
          path: external/opencv-python/wheelhouse/*.whl
          if-no-files-found: error

      - name: publish-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: opencv-python-android-cp314
          name: opencv-python-android-cp314
          files: external/opencv-python/wheelhouse/*.whl
          overwrite_files: true