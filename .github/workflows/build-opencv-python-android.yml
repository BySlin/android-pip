name: build-opencv-python-android

on:
  workflow_dispatch:
    inputs:
      opencv_python_ref:
        required: false
        default: "latest"
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: install-tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cibuildwheel==3.4.0"

      - name: resolve-opencv-python-ref
        id: resolve_ref
        env:
          INPUT_REF: ${{ github.event.inputs.opencv_python_ref }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          input_ref = (os.environ.get("INPUT_REF") or "").strip()
          if input_ref and input_ref.lower() != "latest":
              ref = input_ref
          else:
              with urllib.request.urlopen("https://api.github.com/repos/opencv/opencv-python/releases/latest", timeout=30) as response:
                  data = json.load(response)
              ref = data["tag_name"]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"ref={ref}\n")
          print(ref)
          PY

      - name: checkout-opencv-python
        uses: actions/checkout@v5
        with:
          repository: opencv/opencv-python
          ref: ${{ steps.resolve_ref.outputs.ref }}
          path: external/opencv-python
          submodules: recursive

      - name: fix-setup-py
        working-directory: external/opencv-python
        run: |
          # 在 setup.py 中导入 os 模块的地方后面添加 makedirs 调用
          # 找到写入 config 文件的位置，在前面加上目录创建
          sed -i 's/with open.*python\/cv2\/config-%s.py.*as opencv_init_config:/import os; os.makedirs(os.path.join(cmake_install_dir, "python", "cv2"), exist_ok=True)\n            &/' setup.py

      - name: build-wheel
        working-directory: external/opencv-python
        env:
          CIBW_PLATFORM: android
          CIBW_ARCHS_ANDROID: arm64_v8a x86_64
          CIBW_BUILD: cp314-android_arm64_v8a cp314-android_x86_64
          CIBW_TEST_SKIP: "*"
          CIBW_BUILD_FRONTEND: build
          CIBW_BEFORE_BUILD: "python -m pip install -U pip setuptools wheel numpy"
          CIBW_BUILD_VERBOSITY: "3"
          CMAKE_ARGS: >-
            -DBUILD_ANDROID_PROJECTS=OFF 
            -DBUILD_ANDROID_EXAMPLES=OFF 
            -DBUILD_EXAMPLES=OFF 
            -DBUILD_TESTS=OFF 
            -DBUILD_PERF_TESTS=OFF 
            -DENABLE_PYLINT=OFF 
            -DBUILD_opencv_python3=ON 
            -DBUILD_SHARED_LIBS=OFF 
            -DCMAKE_BUILD_TYPE=Release
            -DINSTALL_CREATE_DISTRIB=ON
        run: python -m cibuildwheel --output-dir wheelhouse . --platform android

      - name: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencv-python-android-cp314-arm64-x86_64
          path: external/opencv-python/wheelhouse/*.whl
          if-no-files-found: error

      - name: publish-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: opencv-python-android-cp314
          name: opencv-python-android-cp314
          files: external/opencv-python/wheelhouse/*.whl
          overwrite_files: true
