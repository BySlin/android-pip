name: build-opencv-python-android

on:
  workflow_dispatch:
    inputs:
      opencv_python_ref:
        required: false
        default: "latest"
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      ANDROID_NDK_VERSION: "26.3.11579264"
      ANDROID_CMAKE_VERSION: "3.22.1"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: install-tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cibuildwheel==3.4.0" "ninja==1.11.1.4"

      - name: install-android-toolchains
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;${ANDROID_CMAKE_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "${GITHUB_ENV}"
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "${GITHUB_ENV}"
          echo "${ANDROID_SDK_ROOT}/cmake/${ANDROID_CMAKE_VERSION}/bin" >> "${GITHUB_PATH}"
          echo "${ANDROID_SDK_ROOT}/platform-tools" >> "${GITHUB_PATH}"

      - name: resolve-opencv-python-ref
        id: resolve_ref
        env:
          INPUT_REF: ${{ github.event.inputs.opencv_python_ref }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          input_ref = (os.environ.get("INPUT_REF") or "").strip()
          if input_ref and input_ref.lower() != "latest":
              ref = input_ref
          else:
              try:
                  with urllib.request.urlopen("https://api.github.com/repos/opencv/opencv-python/releases/latest", timeout=30) as response:
                      data = json.load(response)
                  ref = data["tag_name"]
              except Exception:
                  ref = "4.x"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"ref={ref}\n")
          print(f"resolved opencv-python ref: {ref}", file=sys.stderr)
          PY

      - name: checkout-opencv-python
        uses: actions/checkout@v5
        with:
          repository: opencv/opencv-python
          ref: ${{ steps.resolve_ref.outputs.ref }}
          path: external/opencv-python
          submodules: recursive

      - name: fix-setup-py
        working-directory: external/opencv-python
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path("setup.py")
          s = p.read_text(encoding="utf-8")
          old = "        with open(config_py, 'w') as opencv_init_config:"
          new = "        os.makedirs(os.path.dirname(config_py), exist_ok=True)\n        with open(config_py, 'w') as opencv_init_config:"
          if old in s and "os.makedirs(os.path.dirname(config_py), exist_ok=True)" not in s:
              s = s.replace(old, new, 1)
              p.write_text(s, encoding="utf-8")
          print("patched setup.py for cv2 config dir creation")
          PY

      - name: print-toolchain-versions
        run: |
          python --version
          java -version
          cmake --version
          ninja --version
          "${ANDROID_NDK_HOME}/ndk-build" --version

      - name: build-wheel
        working-directory: external/opencv-python
        env:
          CIBW_PLATFORM: android
          CIBW_ARCHS_ANDROID: arm64_v8a x86_64
          CIBW_BUILD: cp314-android_arm64_v8a cp314-android_x86_64
          CIBW_TEST_SKIP: "*"
          CIBW_BUILD_FRONTEND: build
          CIBW_BEFORE_BUILD: "python -m pip install -U pip setuptools wheel numpy"
          CIBW_BUILD_VERBOSITY: "3"
          CIBW_BUILD_VERBOSITY_ANDROID: "3"
          CMAKE_ARGS: >-
            -DBUILD_ANDROID_PROJECTS=OFF 
            -DBUILD_ANDROID_EXAMPLES=OFF 
            -DBUILD_EXAMPLES=OFF 
            -DBUILD_TESTS=OFF 
            -DBUILD_PERF_TESTS=OFF 
            -DENABLE_PYLINT=OFF 
            -DBUILD_opencv_python3=ON 
            -DBUILD_SHARED_LIBS=OFF 
            -DCMAKE_BUILD_TYPE=Release
            -DINSTALL_CREATE_DISTRIB=ON
        run: |
          set +e
          python -m cibuildwheel --output-dir wheelhouse . --platform android
          status=$?
          if [ "${status}" -ne 0 ]; then
            echo "cibuildwheel failed with exit code ${status}"
            for run_dir in /tmp/cibw-run-*; do
              if [ -d "${run_dir}" ]; then
                find "${run_dir}" -type f \( -name "meson-log.txt" -o -name "*.log" \) 2>/dev/null | head -n 80 | while read -r file; do
                  echo "===== ${file} ====="
                  tail -n 200 "${file}" || true
                done
              fi
            done
            exit "${status}"
          fi

      - name: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencv-python-android-cp314-arm64-x86_64
          path: external/opencv-python/wheelhouse/*.whl
          if-no-files-found: error

      - name: publish-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: opencv-python-android-cp314
          name: opencv-python-android-cp314
          files: external/opencv-python/wheelhouse/*.whl
          overwrite_files: true
