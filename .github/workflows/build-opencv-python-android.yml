name: build-opencv-python-android

on:
  workflow_dispatch:
    inputs:
      opencv_python_ref:
        required: false
        default: "latest"
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: install-tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cibuildwheel==3.4.0"

      - name: resolve-opencv-python-ref
        id: resolve_ref
        env:
          INPUT_REF: ${{ github.event.inputs.opencv_python_ref }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          input_ref = (os.environ.get("INPUT_REF") or "").strip()
          if input_ref and input_ref.lower() != "latest":
              ref = input_ref
          else:
              with urllib.request.urlopen("https://api.github.com/repos/opencv/opencv-python/releases/latest", timeout=30) as response:
                  data = json.load(response)
              ref = data["tag_name"]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"ref={ref}\n")
          print(ref)
          PY

      - name: checkout-opencv-python
        uses: actions/checkout@v5
        with:
          repository: opencv/opencv-python
          ref: ${{ steps.resolve_ref.outputs.ref }}
          path: external/opencv-python
          submodules: recursive

      - name: patch-setup-py
        working-directory: external/opencv-python
        run: |
          # 修复 _classify_installed_files_override 函数中的路径问题
          # 该函数期望在 cmake-install/python/cv2/ 目录下找到 config-3.py
          # 但在某些构建配置中，该目录可能不存在或文件未被正确复制
          cat > patch_setup.py << 'EOF'
          import re
          import sys

          def patch_setup():
              with open('setup.py', 'r') as f:
                  content = f.read()
              
              # 查找 _classify_installed_files_override 函数并添加目录创建逻辑
              # 在打开 config_py 文件之前确保目录存在
              old_pattern = r"(with open\(config_py, 'w'\) as opencv_init_config:)"
              new_code = r"""import os
              os.makedirs(os.path.dirname(config_py), exist_ok=True)
              \1"""
              
              content = re.sub(old_pattern, new_code, content)
              
              # 另外，确保在文件复制之前 python/cv2 目录结构正确
              # 查找文件复制逻辑并添加前置检查
              old_copy = r"(shutil\.copyfile\(cmake_install_file, dest_file\))"
              new_copy = r"""import os
              os.makedirs(os.path.dirname(dest_file), exist_ok=True)
              \1"""
              
              content = re.sub(old_copy, new_copy, content)
              
              with open('setup.py', 'w') as f:
                  f.write(content)
              print("Patched setup.py successfully")

          if __name__ == "__main__":
              patch_setup()
          EOF
          python patch_setup.py

      - name: build-wheel
        working-directory: external/opencv-python
        env:
          CIBW_PLATFORM: android
          CIBW_ARCHS_ANDROID: arm64_v8a x86_64
          CIBW_BUILD: cp314-android_arm64_v8a cp314-android_x86_64
          CIBW_TEST_SKIP: "*"
          CIBW_BUILD_FRONTEND: build
          CIBW_BEFORE_BUILD: "python -m pip install -U pip setuptools wheel numpy"
          CIBW_BUILD_VERBOSITY: "3"
          # 关键修复：调整 CMake 参数以确保 Python 绑定正确安装
          # 1. 移除 OPENCV_SKIP_PYTHON_LOADER=OFF，使用默认行为
          # 2. 使用相对路径确保安装路径正确
          # 3. 启用 INSTALL_CREATE_DISTRIB 以确保文件结构正确
          CMAKE_ARGS: >-
            -DBUILD_ANDROID_PROJECTS=OFF 
            -DBUILD_ANDROID_EXAMPLES=OFF 
            -DBUILD_EXAMPLES=OFF 
            -DBUILD_TESTS=OFF 
            -DBUILD_PERF_TESTS=OFF 
            -DENABLE_PYLINT=OFF 
            -DINSTALL_CREATE_DISTRIB=ON 
            -DBUILD_opencv_python3=ON 
            -DBUILD_SHARED_LIBS=OFF 
            -DCMAKE_BUILD_TYPE=Release
            -DOPENCV_FORCE_PYTHON_LIBS=ON
        run: python -m cibuildwheel --output-dir wheelhouse . --platform android

      - name: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencv-python-android-cp314-arm64-x86_64
          path: external/opencv-python/wheelhouse/*.whl
          if-no-files-found: error

      - name: publish-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: opencv-python-android-cp314
          name: opencv-python-android-cp314
          files: external/opencv-python/wheelhouse/*.whl
          overwrite_files: true
