name: build-android-python-packages

on:
  workflow_dispatch:
    inputs:
      numpy_ref:
        description: "numpy/numpy tag or branch"
        required: false
        default: "latest"
        type: string
      opencv_python_ref:
        description: "opencv/opencv-python tag or branch"
        required: false
        default: "latest"
        type: string
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-android-python-packages.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      ANDROID_NDK_VERSION: "26.3.11579264"
      ANDROID_CMAKE_VERSION: "3.22.1"
      ANDROID_API_LEVEL: "24"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: install-tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cibuildwheel==3.4.0" "ninja==1.11.1.4" wheel

      - name: install-native-build-deps
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf binutils

      - name: install-android-toolchains
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;${ANDROID_CMAKE_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "${GITHUB_ENV}"
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "${GITHUB_ENV}"
          echo "${ANDROID_SDK_ROOT}/cmake/${ANDROID_CMAKE_VERSION}/bin" >> "${GITHUB_PATH}"
          echo "${ANDROID_SDK_ROOT}/platform-tools" >> "${GITHUB_PATH}"

      - name: resolve-refs
        id: resolve_refs
        env:
          INPUT_NUMPY_REF: ${{ github.event.inputs.numpy_ref }}
          INPUT_OPENCV_REF: ${{ github.event.inputs.opencv_python_ref }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          def resolve(input_ref, latest_url, fallback):
              input_ref = (input_ref or "").strip()
              if input_ref and input_ref.lower() != "latest":
                  return input_ref
              try:
                  with urllib.request.urlopen(latest_url, timeout=30) as response:
                      data = json.load(response)
                  return data["tag_name"]
              except Exception:
                  return fallback

          numpy_ref = resolve(
              os.environ.get("INPUT_NUMPY_REF"),
              "https://api.github.com/repos/numpy/numpy/releases/latest",
              "main",
          )
          opencv_ref = resolve(
              os.environ.get("INPUT_OPENCV_REF"),
              "https://api.github.com/repos/opencv/opencv-python/releases/latest",
              "4.x",
          )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"numpy_ref={numpy_ref}\n")
              f.write(f"opencv_ref={opencv_ref}\n")
          print(f"resolved numpy ref: {numpy_ref}")
          print(f"resolved opencv-python ref: {opencv_ref}")
          PY

      - name: print-toolchain-versions
        run: |
          python --version
          java -version
          cmake --version
          ninja --version
          "${ANDROID_NDK_HOME}/ndk-build" --version

      - name: checkout-numpy
        uses: actions/checkout@v5
        with:
          repository: numpy/numpy
          ref: ${{ steps.resolve_refs.outputs.numpy_ref }}
          path: external/numpy
          submodules: recursive

      - name: prepare-numpy-meson
        run: |
          if [ ! -f external/numpy/vendored-meson/meson/meson.py ]; then
            git -C external/numpy submodule sync --recursive || true
            git -C external/numpy submodule update --init --recursive || true
          fi
          if [ ! -f external/numpy/vendored-meson/meson/meson.py ]; then
            mkdir -p external/numpy/vendored-meson
            git clone --depth 1 https://github.com/mesonbuild/meson external/numpy/vendored-meson/meson
          fi
          test -f external/numpy/vendored-meson/meson/meson.py

      - name: patch-numpy-android-longdouble
        working-directory: external/numpy
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path("numpy/_core/meson.build")
          s = p.read_text(encoding="utf-8")
          old = "longdouble_format = meson.get_external_property('longdouble_format', 'UNKNOWN')"
          new = "longdouble_format = meson.get_external_property('longdouble_format', 'UNKNOWN')\nif host_machine.system() == 'android' and longdouble_format == 'UNKNOWN'\n  longdouble_format = 'IEEE_QUAD_LE'\nendif"
          if old in s and "host_machine.system() == 'android'" not in s:
              s = s.replace(old, new, 1)
              p.write_text(s, encoding="utf-8")
          print("patched longdouble detection for android cross build")
          PY

      - name: write-numpy-android-cross-helper
        working-directory: external/numpy
        run: |
          cat > tools/wheels/cibw_prepare_android_cross.sh <<'SH'
          set -e
          build_id="${CIBW_BUILD_IDENTIFIER:-}"
          if [ -z "${build_id}" ] && [ -n "${VIRTUAL_ENV:-}" ]; then
            build_id="$(echo "${VIRTUAL_ENV}" | sed -n 's#.*\(cp[0-9][0-9][0-9]-android_[^/]*\).*#\1#p')"
          fi
          if [ -z "${build_id}" ] && [ -n "${PIP_BUILD_TRACKER:-}" ]; then
            build_id="$(echo "${PIP_BUILD_TRACKER}" | sed -n 's#.*\(cp[0-9][0-9][0-9]-android_[^/]*\).*#\1#p')"
          fi
          api_level="${ANDROID_API_LEVEL:-24}"
          ndk_bin="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          arch_family="x86_64"
          arch_cpu="x86_64"
          c_compiler="${ndk_bin}/x86_64-linux-android${api_level}-clang"
          cpp_compiler="${ndk_bin}/x86_64-linux-android${api_level}-clang++"
          if echo "${build_id}" | grep -q "android_arm64_v8a"; then
            arch_family="aarch64"
            arch_cpu="aarch64"
            c_compiler="${ndk_bin}/aarch64-linux-android${api_level}-clang"
            cpp_compiler="${ndk_bin}/aarch64-linux-android${api_level}-clang++"
          fi
          ar_bin="${ndk_bin}/llvm-ar"
          strip_bin="${ndk_bin}/llvm-strip"
          cat > /tmp/meson-android-cross.ini <<EOF
          [binaries]
          c = '${c_compiler}'
          cpp = '${cpp_compiler}'
          ar = '${ar_bin}'
          strip = '${strip_bin}'
          [host_machine]
          system = 'android'
          cpu_family = '${arch_family}'
          cpu = '${arch_cpu}'
          endian = 'little'
          [properties]
          needs_exe_wrapper = true
          longdouble_format = 'IEEE_QUAD_LE'
          EOF
          SH
          chmod +x tools/wheels/cibw_prepare_android_cross.sh

      - name: build-numpy-wheel
        working-directory: external/numpy
        env:
          CIBW_PLATFORM: android
          CIBW_ARCHS_ANDROID: arm64_v8a x86_64
          CIBW_BUILD: cp314-android_arm64_v8a cp314-android_x86_64
          CIBW_TEST_SKIP: "*"
          CIBW_BUILD_VERBOSITY: "3"
          CIBW_BUILD_VERBOSITY_ANDROID: "3"
          CIBW_BEFORE_BUILD: "export INSTALL_OPENBLAS=false && bash {project}/tools/wheels/cibw_before_build.sh {project} && bash {project}/tools/wheels/cibw_prepare_android_cross.sh"
          CIBW_CONFIG_SETTINGS: "setup-args=--cross-file=/tmp/meson-android-cross.ini setup-args=-Dallow-noblas=true setup-args=-Duse-ilp64=false setup-args=-Dblas=none setup-args=-Dlapack=none setup-args=-Db_lundef=false setup-args=-Dc_link_args=-Wl,--allow-shlib-undefined setup-args=-Dcpp_link_args=-Wl,--allow-shlib-undefined"
          CIBW_CONFIG_SETTINGS_ANDROID: "setup-args=--cross-file=/tmp/meson-android-cross.ini setup-args=-Dallow-noblas=true setup-args=-Duse-ilp64=false setup-args=-Dblas=none setup-args=-Dlapack=none setup-args=-Db_lundef=false setup-args=-Dc_link_args=-Wl,--allow-shlib-undefined setup-args=-Dcpp_link_args=-Wl,--allow-shlib-undefined"
          CIBW_ENVIRONMENT_ANDROID: "ANDROID_API_LEVEL=${ANDROID_API_LEVEL} LDFLAGS='-lm -lcompiler_rt $LDFLAGS -Wl,--no-as-needed -lpython3.14 -Wl,--as-needed -Wl,-z,max-page-size=16384'"
        run: |
          python -m cibuildwheel --output-dir wheelhouse . --platform android

      - name: verify-numpy-wheel-abis
        working-directory: external/numpy
        run: |
          python3 - <<'PY'
          import glob
          import os
          import re
          wheels = sorted(glob.glob("wheelhouse/*.whl"))
          if not wheels:
              raise SystemExit("no wheels generated")
          need = {"arm64_v8a": False, "x86_64": False}
          for wheel in wheels:
              name = os.path.basename(wheel)
              if re.search(r"android(_[0-9]+)?_arm64_v8a\.whl$", name):
                  need["arm64_v8a"] = True
              if re.search(r"android(_[0-9]+)?_x86_64\.whl$", name):
                  need["x86_64"] = True
          missing = [abi for abi, ok in need.items() if not ok]
          if missing:
              raise SystemExit(f"missing wheel abi: {', '.join(missing)}")
          print("verified wheel abis:", ", ".join(sorted(need)))
          PY

      - name: patch-numpy-wheel-libpython-needed
        working-directory: external/numpy
        run: |
          set -euo pipefail
          rm -rf /tmp/numpy-wheel-unpack /tmp/numpy-wheel-repack
          mkdir -p /tmp/numpy-wheel-unpack /tmp/numpy-wheel-repack
          shopt -s nullglob
          for whl in wheelhouse/*.whl; do
            rm -rf /tmp/numpy-wheel-unpack/*
            python3 -m wheel unpack "$whl" -d /tmp/numpy-wheel-unpack
            pkg="$(find /tmp/numpy-wheel-unpack -mindepth 1 -maxdepth 1 -type d | head -n 1)"
            while IFS= read -r -d '' so; do
              if ! objdump -p "$so" | grep -E -q "NEEDED[[:space:]]+libpython3\\.14\\.so"; then
                patchelf --add-needed libpython3.14.so "$so"
              fi
            done < <(find "$pkg" -type f -name "*.so" -print0)
            python3 -m wheel pack "$pkg" -d /tmp/numpy-wheel-repack
          done
          rm -f wheelhouse/*.whl
          cp -f /tmp/numpy-wheel-repack/*.whl wheelhouse/

      - name: verify-numpy-wheel-libpython-needed
        working-directory: external/numpy
        run: |
          python3 - <<'PY'
          import glob
          import os
          import subprocess
          import tempfile
          import zipfile

          wheels = sorted(glob.glob("wheelhouse/*.whl"))
          if not wheels:
              raise SystemExit("no wheels")
          for wheel in wheels:
              with tempfile.TemporaryDirectory() as td:
                  with zipfile.ZipFile(wheel) as zf:
                      zf.extractall(td)
                  target = None
                  for root, _, files in os.walk(td):
                      for f in files:
                          if f.endswith(".so") and "_multiarray_umath" in f:
                              target = os.path.join(root, f)
                              break
                      if target:
                          break
                  if not target:
                      raise SystemExit(f"_multiarray_umath not found in {wheel}")
                  out = subprocess.check_output(["objdump", "-p", target], text=True)
                  if "libpython3.14.so" not in out:
                      raise SystemExit(f"missing libpython3.14.so in {wheel}")
                  print(f"verified libpython needed: {os.path.basename(wheel)}")
          PY

      - name: upload-numpy-artifact
        uses: actions/upload-artifact@v4
        with:
          name: numpy-android-cp314-arm64-x86_64
          path: external/numpy/wheelhouse/*.whl
          if-no-files-found: error

      - name: checkout-opencv-python
        uses: actions/checkout@v5
        with:
          repository: opencv/opencv-python
          ref: ${{ steps.resolve_refs.outputs.opencv_ref }}
          path: external/opencv-python
          submodules: recursive

      - name: fix-opencv-python-for-android
        working-directory: external/opencv-python
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          p = Path("setup.py")
          s = p.read_text(encoding="utf-8")
          s = re.sub(
              r"(?m)^(\s*)with open\(config_py, 'w'\) as opencv_init_config:$",
              r"\1os.makedirs(os.path.dirname(config_py), exist_ok=True)\n\1with open(config_py, 'w') as opencv_init_config:",
              s,
              count=1,
          )
          s = s.replace("-DPYTHON3_LIMITED_API=ON", "-DPYTHON3_LIMITED_API=OFF")
          s = s.replace(
              "\"-DPYTHON3_INCLUDE_DIR=%s\" % python_include_dir,",
              "\"-DPYTHON3_INCLUDE_DIR=%s\" % python_include_dir,\n                \"-DPython3_INCLUDE_DIR=%s\" % python_include_dir,",
          )
          s = s.replace(
              "\"-DPYTHON3_LIBRARY=%s\" % python_lib_path,",
              "\"-DPYTHON3_LIBRARY=%s\" % python_lib_path,\n                \"-DPython3_LIBRARY=%s\" % python_lib_path,\n                \"-DPython3_LIBRARIES=%s\" % python_lib_path,",
          )
          s, n1 = re.subn(
              r'raise Exception\("Not found: .*% relpath_re\)',
              'if relpath_re.startswith("share/opencv4/"):\n                          continue\n                          raise Exception("Not found: \'%s\'" % relpath_re)',
              s,
              count=1,
          )
          if n1 == 0:
              raise RuntimeError("failed to patch share/opencv4 not-found rule")
          p.write_text(s, encoding="utf-8")

          p2 = Path("opencv/modules/python/CMakeLists.txt")
          s2 = p2.read_text(encoding="utf-8")
          s2, n2 = re.subn(r"if\(\s*ANDROID\s+OR\s+APPLE_FRAMEWORK\s+OR\s+WINRT\s*\)", "if(APPLE_FRAMEWORK OR WINRT)", s2, count=1)
          p2.write_text(s2, encoding="utf-8")

          p4 = Path("opencv/modules/python/python3/CMakeLists.txt")
          s4 = p4.read_text(encoding="utf-8")
          s4, n5 = re.subn(r"if\(NOT PYTHON3_INCLUDE_PATH OR NOT PYTHON3_NUMPY_INCLUDE_DIRS\)\n\s*ocv_module_disable\(python3\)\nendif\(\)\n\n", "", s4, count=1)
          p4.write_text(s4, encoding="utf-8")

          p3 = Path("opencv/cmake/OpenCVDetectPython.cmake")
          s3 = p3.read_text(encoding="utf-8")
          s3, n3 = re.subn(r"if\(NOT\s+ANDROID\s+AND\s+NOT\s+APPLE_FRAMEWORK\)", "if(NOT APPLE_FRAMEWORK)", s3, count=1)
          s3, n4 = re.subn(r"if\(NOT\s+ANDROID\s+AND\s+NOT\s+IOS\s+AND\s+NOT\s+XROS\)", "if(NOT IOS AND NOT XROS)", s3, count=1)
          marker = "# android-python3-force"
          if marker not in s3:
              s3 += "\n\nif(ANDROID)\n  if(PYTHON3_INCLUDE_DIR AND NOT PYTHON3_INCLUDE_PATH)\n    set(PYTHON3_INCLUDE_PATH \"${PYTHON3_INCLUDE_DIR}\")\n  endif()\n  if(PYTHON3_LIBRARY AND NOT PYTHON3_LIBRARIES)\n    set(PYTHON3_LIBRARIES \"${PYTHON3_LIBRARY}\")\n  endif()\n  if(PYTHON3_LIBRARIES)\n    set(PYTHON3LIBS_FOUND TRUE)\n  endif()\n  if(Python3_NumPy_INCLUDE_DIRS AND NOT PYTHON3_NUMPY_INCLUDE_DIRS)\n    set(PYTHON3_NUMPY_INCLUDE_DIRS \"${Python3_NumPy_INCLUDE_DIRS}\")\n  endif()\nendif()  # android-python3-force\n"
          p3.write_text(s3, encoding="utf-8")
          if n2 == 0 or n3 == 0 or n4 == 0 or n5 == 0:
              raise RuntimeError(f"android python patch not applied fully: n2={n2}, n3={n3}, n4={n4}, n5={n5}")
          print("patched setup.py for android python3 detection")
          PY

      - name: build-opencv-wheel
        working-directory: external/opencv-python
        env:
          CIBW_PLATFORM: android
          CIBW_ARCHS_ANDROID: arm64_v8a x86_64
          CIBW_BUILD: cp314-android_arm64_v8a cp314-android_x86_64
          CIBW_TEST_SKIP: "*"
          CIBW_BUILD_FRONTEND: build
          CIBW_BEFORE_BUILD: "python -m pip install -U pip setuptools wheel numpy"
          CIBW_BUILD_VERBOSITY: "3"
          CIBW_BUILD_VERBOSITY_ANDROID: "3"
          CIBW_ENVIRONMENT_ANDROID: "ANDROID_API_LEVEL=${ANDROID_API_LEVEL} LDFLAGS='-lm -lcompiler_rt $LDFLAGS -Wl,--no-as-needed -lpython3.14 -Wl,--as-needed -Wl,-z,max-page-size=16384'"
          CMAKE_ARGS: >-
            -DBUILD_ANDROID_PROJECTS=OFF
            -DBUILD_ANDROID_EXAMPLES=OFF
            -DBUILD_EXAMPLES=OFF
            -DBUILD_DOCS=OFF
            -DBUILD_JAVA=OFF
            -DBUILD_FAT_JAVA_LIB=OFF
            -DBUILD_JPEG=ON
            -DBUILD_PNG=ON
            -DBUILD_TIFF=ON
            -DBUILD_WEBP=ON
            -DBUILD_TESTS=OFF
            -DBUILD_PERF_TESTS=OFF
            -DBUILD_LIST=core,imgproc,imgcodecs,python3
            -DBUILD_opencv_apps=OFF
            -DBUILD_opencv_calib3d=OFF
            -DBUILD_opencv_dnn=OFF
            -DBUILD_opencv_features2d=OFF
            -DBUILD_opencv_flann=OFF
            -DBUILD_opencv_gapi=OFF
            -DBUILD_opencv_highgui=OFF
            -DBUILD_opencv_java_bindings_generator=OFF
            -DBUILD_opencv_js=OFF
            -DBUILD_opencv_ml=OFF
            -DBUILD_opencv_objc=OFF
            -DENABLE_PYLINT=OFF
            -DBUILD_opencv_python3=ON
            -DBUILD_opencv_python2=OFF
            -DBUILD_SHARED_LIBS=ON
            -DCMAKE_BUILD_TYPE=Release
            -DINSTALL_CREATE_DISTRIB=ON
            -DWITH_1394=OFF
            -DWITH_CUDA=OFF
            -DWITH_FFMPEG=OFF
            -DWITH_GSTREAMER=OFF
            -DWITH_IPP=OFF
            -DWITH_ITT=OFF
            -DWITH_JASPER=OFF
            -DWITH_MSMF=OFF
            -DWITH_OPENCL=OFF
            -DWITH_OPENCLAMDBLAS=OFF
            -DWITH_OPENCLAMDFFT=OFF
            -DWITH_OPENEXR=OFF
            -DWITH_PROTOBUF=OFF
            -DWITH_QUIRC=OFF
            -DWITH_TBB=OFF
            -DWITH_V4L=OFF
            -DWITH_VA=OFF
            -DWITH_VULKAN=OFF
            -DANDROID_PLATFORM=android-24
        run: |
          python -m cibuildwheel --output-dir wheelhouse . --platform android

      - name: verify-opencv-wheel-abis
        working-directory: external/opencv-python
        run: |
          python3 - <<'PY'
          import glob
          import os
          import re
          wheels = sorted(glob.glob("wheelhouse/*.whl"))
          if not wheels:
              raise SystemExit("no wheels generated")
          need = {"arm64_v8a": False, "x86_64": False}
          for wheel in wheels:
              name = os.path.basename(wheel)
              if re.search(r"android(_[0-9]+)?_arm64_v8a\.whl$", name):
                  need["arm64_v8a"] = True
              if re.search(r"android(_[0-9]+)?_x86_64\.whl$", name):
                  need["x86_64"] = True
          missing = [abi for abi, ok in need.items() if not ok]
          if missing:
              raise SystemExit(f"missing wheel abi: {', '.join(missing)}")
          print("verified wheel abis:", ", ".join(sorted(need)))
          PY

      - name: validate-opencv-wheel-contents
        working-directory: external/opencv-python
        run: |
          python3 - <<'PY'
          import glob
          import os
          import sys
          import zipfile

          wheels = sorted(glob.glob("wheelhouse/*.whl"))
          if not wheels:
              print("no wheels generated", file=sys.stderr)
              sys.exit(1)

          bad = []
          for wheel in wheels:
              size = os.path.getsize(wheel)
              with zipfile.ZipFile(wheel, "r") as zf:
                  names = zf.namelist()
              has_cv2_native = any(
                  n.startswith("cv2/") and (n.endswith(".so") or ".so." in n)
                  for n in names
              )
              if not has_cv2_native:
                  bad.append((wheel, size, has_cv2_native))

          if bad:
              for wheel, size, has_cv2_native in bad:
                  print(f"invalid wheel: {wheel} size={size} has_cv2_native={has_cv2_native}", file=sys.stderr)
              print("opencv android wheel missing native cv2 module", file=sys.stderr)
              sys.exit(2)
          PY

      - name: patch-opencv-wheel-cv2-loader
        working-directory: external/opencv-python
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import glob
          import re
          import shutil
          import subprocess
          from pathlib import Path

          unpack_root = Path("/tmp/opencv-loader-unpack")
          repack_root = Path("/tmp/opencv-loader-repack")
          shutil.rmtree(unpack_root, ignore_errors=True)
          shutil.rmtree(repack_root, ignore_errors=True)
          unpack_root.mkdir(parents=True, exist_ok=True)
          repack_root.mkdir(parents=True, exist_ok=True)

          wheels = sorted(glob.glob("wheelhouse/*.whl"))
          if not wheels:
              raise SystemExit("no wheels in wheelhouse")

          for whl in wheels:
              for child in unpack_root.iterdir():
                  if child.is_dir():
                      shutil.rmtree(child, ignore_errors=True)
                  else:
                      child.unlink(missing_ok=True)
              subprocess.run(["python3", "-m", "wheel", "unpack", whl, "-d", str(unpack_root)], check=True)
              packages = [p for p in unpack_root.iterdir() if p.is_dir()]
              if not packages:
                  raise SystemExit(f"unpack failed: {whl}")
              pkg = packages[0]

              init_py = pkg / "cv2" / "__init__.py"
              s = init_py.read_text(encoding="utf-8")
              s, _ = re.subn(
                  r'native_module\s*=\s*importlib\.import_module\(["\']cv2["\']\)',
                  'native_module = importlib.import_module("cv2.cv2")',
                  s,
                  count=1,
              )
              s, n_cfg = re.subn(
                  r"(?m)^(?P<indent>\s*)load_first_config\(\['config\.py'\], True\)$",
                  r"\g<indent>if not os.path.exists(os.path.join(LOADER_DIR, 'config.py')):\n"
                  r"\g<indent>    _fallback_cfg = (\n"
                  r"\g<indent>        \"PYTHON_EXTENSIONS_PATHS = [LOADER_DIR]\\n\"\n"
                  r"\g<indent>        \"BINARIES_PATHS = [os.path.join(LOADER_DIR, '..', 'opencv_python.libs')]\\n\"\n"
                  r"\g<indent>    )\n"
                  r"\g<indent>    try:\n"
                  r"\g<indent>        with open(os.path.join(LOADER_DIR, 'config.py'), 'w', encoding='utf-8') as f:\n"
                  r"\g<indent>            f.write(_fallback_cfg)\n"
                  r"\g<indent>    except Exception:\n"
                  r"\g<indent>        pass\n"
                  r"\g<indent>load_first_config(['config.py'], True)",
                  s,
                  count=1,
              )
              if n_cfg == 0:
                  raise RuntimeError("failed to patch load_first_config(['config.py'], True)")
              init_py.write_text(s, encoding="utf-8")

              cv2_dir = pkg / "cv2"
              config_py = cv2_dir / "config.py"
              if not config_py.exists():
                  source = next(
                      (
                          p.read_text(encoding="utf-8")
                          for p in (cv2_dir / "config-3.14.py", cv2_dir / "config-3.py")
                          if p.exists()
                      ),
                      "PYTHON_EXTENSIONS_PATHS = []\nBINARIES_PATHS = []\n",
                  )
                  config_py.write_text(source, encoding="utf-8")

              subprocess.run(["python3", "-m", "wheel", "pack", str(pkg), "-d", str(repack_root)], check=True)

          for old in Path("wheelhouse").glob("*.whl"):
              old.unlink()
          for new_wheel in repack_root.glob("*.whl"):
              shutil.copy2(new_wheel, Path("wheelhouse") / new_wheel.name)
          PY

      - name: patch-opencv-wheel-bundle-opencv-world
        working-directory: external/opencv-python
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import glob
          import os
          import re
          import shutil
          import subprocess
          from pathlib import Path

          unpack_root = Path('/tmp/opencv-world-unpack')
          repack_root = Path('/tmp/opencv-world-repack')
          shutil.rmtree(unpack_root, ignore_errors=True)
          shutil.rmtree(repack_root, ignore_errors=True)
          unpack_root.mkdir(parents=True, exist_ok=True)
          repack_root.mkdir(parents=True, exist_ok=True)

          wheels = sorted(glob.glob('wheelhouse/*.whl'))
          if not wheels:
              raise SystemExit('no wheels in wheelhouse')

          def abi_from_wheel(path: str) -> str:
              name = os.path.basename(path)
              m = re.search(r'android(?:_[0-9]+)?_(arm64_v8a|x86_64)\.whl$', name)
              if not m:
                  raise SystemExit(f'cannot parse abi from wheel: {name}')
              return m.group(1)

          for whl in wheels:
              for child in unpack_root.iterdir():
                  if child.is_dir():
                      shutil.rmtree(child, ignore_errors=True)
                  else:
                      child.unlink(missing_ok=True)

              subprocess.run(['python3', '-m', 'wheel', 'unpack', whl, '-d', str(unpack_root)], check=True)
              packages = [p for p in unpack_root.iterdir() if p.is_dir()]
              if not packages:
                  raise SystemExit(f'unpack failed: {whl}')
              pkg = packages[0]

              abi = abi_from_wheel(whl)
              lib_src = Path(f'_skbuild/android-24-{abi}-3.14/cmake-install/sdk/native/libs/libopencv_world.so')
              if not lib_src.exists():
                  raise SystemExit(f'missing source libopencv_world.so: {lib_src}')

              libs_dir = pkg / 'opencv_python.libs'
              libs_dir.mkdir(parents=True, exist_ok=True)
              lib_dst = libs_dir / 'libopencv_world.so'
              shutil.copy2(lib_src, lib_dst)
              print(f'bundled {lib_dst.name} into {os.path.basename(whl)}')

              subprocess.run(['python3', '-m', 'wheel', 'pack', str(pkg), '-d', str(repack_root)], check=True)

          for old in Path('wheelhouse').glob('*.whl'):
              old.unlink()
          for new_wheel in repack_root.glob('*.whl'):
              shutil.copy2(new_wheel, Path('wheelhouse') / new_wheel.name)
          PY

      - name: patch-opencv-wheel-libpython-needed
        working-directory: external/opencv-python
        run: |
          set -euo pipefail
          rm -rf /tmp/opencv-wheel-unpack /tmp/opencv-wheel-repack
          mkdir -p /tmp/opencv-wheel-unpack /tmp/opencv-wheel-repack
          shopt -s nullglob
          for whl in wheelhouse/*.whl; do
            rm -rf /tmp/opencv-wheel-unpack/*
            python3 -m wheel unpack "$whl" -d /tmp/opencv-wheel-unpack
            pkg="$(find /tmp/opencv-wheel-unpack -mindepth 1 -maxdepth 1 -type d | head -n 1)"
            while IFS= read -r -d '' so; do
              if ! objdump -p "$so" | grep -E -q "NEEDED[[:space:]]+libpython3\\.14\\.so"; then
                patchelf --add-needed libpython3.14.so "$so"
              fi
            done < <(find "$pkg/cv2" -type f -name "*.so" -print0 2>/dev/null || true)
            python3 -m wheel pack "$pkg" -d /tmp/opencv-wheel-repack
          done
          rm -f wheelhouse/*.whl
          cp -f /tmp/opencv-wheel-repack/*.whl wheelhouse/

      - name: verify-opencv-wheel-libpython-needed
        working-directory: external/opencv-python
        run: |
          python3 - <<'PY'
          import glob
          import os
          import subprocess
          import tempfile
          import zipfile

          wheels = sorted(glob.glob("wheelhouse/*.whl"))
          if not wheels:
              raise SystemExit("no wheels")
          for wheel in wheels:
              with tempfile.TemporaryDirectory() as td:
                  with zipfile.ZipFile(wheel) as zf:
                      zf.extractall(td)
                      names = set(zf.namelist())
                  target = None
                  for root, _, files in os.walk(td):
                      for f in files:
                          if f.startswith("cv2") and f.endswith(".so"):
                              target = os.path.join(root, f)
                              break
                      if target:
                          break
                  if not target:
                      raise SystemExit(f"cv2 native .so not found in {wheel}")
                  out = subprocess.check_output(["objdump", "-p", target], text=True)
                  if "libpython3.14.so" not in out:
                      raise SystemExit(f"missing libpython3.14.so in {wheel}")
                  if "opencv_python.libs/libopencv_world.so" not in names:
                      raise SystemExit(f"missing bundled libopencv_world.so in {wheel}")
                  print(f"verified wheel deps: {os.path.basename(wheel)}")
          PY

