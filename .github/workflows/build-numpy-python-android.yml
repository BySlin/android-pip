name: build-numpy-python-android

on:
  workflow_dispatch:
    inputs:
      numpy_ref:
        required: false
        default: "latest"
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      ANDROID_NDK_VERSION: "26.3.11579264"
      ANDROID_CMAKE_VERSION: "3.22.1"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: install-tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cibuildwheel==3.4.0" "ninja==1.11.1.4"

      - name: install-android-toolchains
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;${ANDROID_CMAKE_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "${GITHUB_ENV}"
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "${GITHUB_ENV}"
          echo "${ANDROID_SDK_ROOT}/cmake/${ANDROID_CMAKE_VERSION}/bin" >> "${GITHUB_PATH}"
          echo "${ANDROID_SDK_ROOT}/platform-tools" >> "${GITHUB_PATH}"

      - name: resolve-numpy-ref
        id: resolve_ref
        env:
          INPUT_REF: ${{ github.event.inputs.numpy_ref }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          input_ref = (os.environ.get("INPUT_REF") or "").strip()
          if input_ref and input_ref.lower() != "latest":
              ref = input_ref
          else:
              try:
                  with urllib.request.urlopen("https://api.github.com/repos/numpy/numpy/releases/latest", timeout=30) as response:
                      data = json.load(response)
                  ref = data["tag_name"]
              except Exception:
                  ref = "main"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"ref={ref}\n")
          print(f"resolved numpy ref: {ref}", file=sys.stderr)
          PY

      - name: checkout-numpy
        uses: actions/checkout@v5
        with:
          repository: numpy/numpy
          ref: ${{ steps.resolve_ref.outputs.ref }}
          path: external/numpy
          submodules: recursive

      - name: prepare-numpy-meson
        run: |
          if [ ! -f external/numpy/vendored-meson/meson/meson.py ]; then
            git -C external/numpy submodule sync --recursive || true
            git -C external/numpy submodule update --init --recursive || true
          fi
          if [ ! -f external/numpy/vendored-meson/meson/meson.py ]; then
            mkdir -p external/numpy/vendored-meson
            git clone --depth 1 https://github.com/mesonbuild/meson external/numpy/vendored-meson/meson
          fi
          test -f external/numpy/vendored-meson/meson/meson.py

      - name: patch-numpy-android-longdouble
        working-directory: external/numpy
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path("numpy/_core/meson.build")
          s = p.read_text(encoding="utf-8")
          old = "longdouble_format = meson.get_external_property('longdouble_format', 'UNKNOWN')"
          new = "longdouble_format = meson.get_external_property('longdouble_format', 'UNKNOWN')\nif host_machine.system() == 'android' and longdouble_format == 'UNKNOWN'\n  longdouble_format = 'IEEE_QUAD_LE'\nendif"
          if old in s and "host_machine.system() == 'android'" not in s:
              s = s.replace(old, new, 1)
              p.write_text(s, encoding="utf-8")
          print("patched longdouble detection for android cross build")
          PY

      - name: print-toolchain-versions
        run: |
          python --version
          java -version
          cmake --version
          ninja --version
          "${ANDROID_NDK_HOME}/ndk-build" --version

      - name: write-numpy-android-cross-helper
        working-directory: external/numpy
        run: |
          cat > tools/wheels/cibw_prepare_android_cross.sh <<'SH'
          set -e
          build_id="${CIBW_BUILD_IDENTIFIER:-}"
          if [ -z "${build_id}" ] && [ -n "${VIRTUAL_ENV:-}" ]; then
            build_id="$(echo "${VIRTUAL_ENV}" | sed -n 's#.*\(cp[0-9][0-9][0-9]-android_[^/]*\).*#\1#p')"
          fi
          if [ -z "${build_id}" ] && [ -n "${PIP_BUILD_TRACKER:-}" ]; then
            build_id="$(echo "${PIP_BUILD_TRACKER}" | sed -n 's#.*\(cp[0-9][0-9][0-9]-android_[^/]*\).*#\1#p')"
          fi
          api_level="${ANDROID_API_LEVEL:-28}"
          ndk_bin="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          arch_family="x86_64"
          arch_cpu="x86_64"
          c_compiler="${ndk_bin}/x86_64-linux-android${api_level}-clang"
          cpp_compiler="${ndk_bin}/x86_64-linux-android${api_level}-clang++"
          if echo "${build_id}" | grep -q "android_arm64_v8a"; then
            arch_family="aarch64"
            arch_cpu="aarch64"
            c_compiler="${ndk_bin}/aarch64-linux-android${api_level}-clang"
            cpp_compiler="${ndk_bin}/aarch64-linux-android${api_level}-clang++"
          fi
          if [ ! -x "${c_compiler}" ] || [ ! -x "${cpp_compiler}" ]; then
            echo "invalid compiler path for ${build_id}"
            echo "c=${c_compiler}"
            echo "cpp=${cpp_compiler}"
            exit 1
          fi
          ar_bin="${ndk_bin}/llvm-ar"
          strip_bin="${ndk_bin}/llvm-strip"
          echo "build_id=${build_id}"
          echo "api_level=${api_level}"
          echo "c_compiler=${c_compiler}"
          echo "cpp_compiler=${cpp_compiler}"
          cat > /tmp/meson-android-cross.ini <<EOF
          [binaries]
          c = '${c_compiler}'
          cpp = '${cpp_compiler}'
          ar = '${ar_bin}'
          strip = '${strip_bin}'
          [host_machine]
          system = 'android'
          cpu_family = '${arch_family}'
          cpu = '${arch_cpu}'
          endian = 'little'
          [properties]
          needs_exe_wrapper = true
          longdouble_format = 'IEEE_QUAD_LE'
          EOF
          SH
          chmod +x tools/wheels/cibw_prepare_android_cross.sh

      - name: build-wheel
        working-directory: external/numpy
        env:
          CIBW_PLATFORM: android
          CIBW_ARCHS_ANDROID: arm64_v8a x86_64
          CIBW_BUILD: cp314-android_arm64_v8a cp314-android_x86_64
          CIBW_TEST_SKIP: "*"
          CIBW_BUILD_VERBOSITY: "3"
          CIBW_BUILD_VERBOSITY_ANDROID: "3"
          CIBW_BEFORE_BUILD: "export INSTALL_OPENBLAS=false && bash {project}/tools/wheels/cibw_before_build.sh {project} && bash {project}/tools/wheels/cibw_prepare_android_cross.sh"
          CIBW_CONFIG_SETTINGS: "setup-args=--cross-file=/tmp/meson-android-cross.ini setup-args=-Dallow-noblas=true setup-args=-Duse-ilp64=false setup-args=-Dblas=none setup-args=-Dlapack=none"
          CIBW_CONFIG_SETTINGS_ANDROID: "setup-args=--cross-file=/tmp/meson-android-cross.ini setup-args=-Dallow-noblas=true setup-args=-Duse-ilp64=false setup-args=-Dblas=none setup-args=-Dlapack=none"
        run: |
          set +e
          echo "CIBW_CONFIG_SETTINGS=${CIBW_CONFIG_SETTINGS}"
          echo "CIBW_CONFIG_SETTINGS_ANDROID=${CIBW_CONFIG_SETTINGS_ANDROID}"
          echo "CIBW_BUILD_VERBOSITY=${CIBW_BUILD_VERBOSITY}"
          echo "CIBW_BUILD_VERBOSITY_ANDROID=${CIBW_BUILD_VERBOSITY_ANDROID}"
          python -m cibuildwheel --output-dir wheelhouse . --platform android
          status=$?
          if [ "${status}" -ne 0 ]; then
            echo "cibuildwheel failed with exit code ${status}"
            find external/numpy -type f -path "*/meson-logs/meson-log.txt" 2>/dev/null | head -n 20 | while read -r meson_file; do
              echo "===== first-error-context: ${meson_file} ====="
              err_line="$(grep -n "ERROR:" "${meson_file}" | head -n 1 | cut -d: -f1)"
              if [ -n "${err_line}" ]; then
                start_line=$((err_line - 40))
                if [ "${start_line}" -lt 1 ]; then start_line=1; fi
                end_line=$((err_line + 60))
                sed -n "${start_line},${end_line}p" "${meson_file}" || true
              else
                tail -n 200 "${meson_file}" || true
              fi
            done
            for run_dir in /tmp/cibw-run-*; do
              if [ -d "${run_dir}" ]; then
                find "${run_dir}" -type f -name "meson-log.txt" 2>/dev/null | head -n 20 | while read -r meson_file; do
                  echo "===== first-error-context: ${meson_file} ====="
                  err_line="$(grep -n "ERROR:" "${meson_file}" | head -n 1 | cut -d: -f1)"
                  if [ -n "${err_line}" ]; then
                    start_line=$((err_line - 40))
                    if [ "${start_line}" -lt 1 ]; then start_line=1; fi
                    end_line=$((err_line + 60))
                    sed -n "${start_line},${end_line}p" "${meson_file}" || true
                  fi
                done
                find "${run_dir}" -type f \( -name "meson-log.txt" -o -name "*.log" \) 2>/dev/null | head -n 80 | while read -r file; do
                  echo "===== ${file} ====="
                  tail -n 200 "${file}" || true
                done
              fi
            done
            exit "${status}"
          fi

      - name: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: numpy-android-cp314-arm64-x86_64
          path: external/numpy/wheelhouse/*.whl
          if-no-files-found: error

      - name: publish-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: numpy-android-cp314
          name: numpy-android-cp314
          files: external/numpy/wheelhouse/*.whl
          overwrite_files: true
