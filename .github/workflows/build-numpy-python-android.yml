name: build-numpy-python-android

on:
  workflow_dispatch:
    inputs:
      numpy_ref:
        required: false
        default: "latest"
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: install-tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cibuildwheel==3.4.0"

      - name: resolve-numpy-ref
        id: resolve_ref
        env:
          INPUT_REF: ${{ github.event.inputs.numpy_ref }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          input_ref = (os.environ.get("INPUT_REF") or "").strip()
          if input_ref and input_ref.lower() != "latest":
              ref = input_ref
          else:
              with urllib.request.urlopen("https://api.github.com/repos/numpy/numpy/releases/latest", timeout=30) as response:
                  data = json.load(response)
              ref = data["tag_name"]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"ref={ref}\n")
          print(ref)
          PY

      - name: checkout-numpy
        uses: actions/checkout@v4
        with:
          repository: numpy/numpy
          ref: ${{ steps.resolve_ref.outputs.ref }}
          path: external/numpy

      - name: build-wheel
        working-directory: external/numpy
        env:
          CIBW_PLATFORM: android
          CIBW_ARCHS_ANDROID: arm64_v8a x86_64
          CIBW_BUILD: cp314-android_arm64_v8a cp314-android_x86_64
          CIBW_TEST_SKIP: "*"
          CIBW_BUILD_FRONTEND: pip
          CIBW_BUILD_VERBOSITY: "1"
        run: python -m cibuildwheel --output-dir wheelhouse . --platform android

      - name: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: numpy-android-cp314-arm64-x86_64
          path: external/numpy/wheelhouse/*.whl
          if-no-files-found: error

      - name: publish-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: numpy-android-cp314
          name: numpy-android-cp314
          files: external/numpy/wheelhouse/*.whl
          overwrite_files: true
